<!DOCTYPE html>
<html>
<head>
<style>
    /* 🛑 THE WHITE BACKGROUND KILLER */
    * { box-sizing: border-box; }
    
    html, body {
        background: transparent !important; 
        margin: 0;
        padding: 20px; 
        width: 100%;
        overflow: hidden;
        font-family: 'Segoe UI', Arial, sans-serif;
    }

    .inferno-container {
        background: #050505;
        border: 2px solid #ff3c00;
        border-radius: 25px;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 0 15px rgba(255, 60, 0, 0.4);
        width: 100%;
    }

    /* 🔥 THE LIVE TITLE BAR */
    .header {
        padding: 15px;
        background: #0a0a0a;
        border-bottom: 2px solid #ff3c00;
        color: #ffae00;
        text-transform: uppercase;
        font-weight: 900;
        letter-spacing: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-shadow: 0 0 8px #ff3c00;
    }

    .live-dot {
        width: 10px; height: 10px;
        background: #ff3c00;
        border-radius: 50%;
        box-shadow: 0 0 10px #ff3c00;
        animation: livePulse 1.5s infinite;
    }

    @keyframes livePulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.3); opacity: 0.6; }
        100% { transform: scale(1); opacity: 1; }
    }

    #memberList {
        padding: 15px;
        background: #000;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .member-card {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px;
        background: rgba(255, 60, 0, 0.05);
        border: 1px solid rgba(255, 60, 0, 0.15);
        border-radius: 15px;
        color: #eee;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .member-card:hover {
        background: rgba(255, 60, 0, 0.2);
        border-color: #ff3c00;
        transform: scale(1.03) translateX(5px);
        box-shadow: 0 0 20px rgba(255, 60, 0, 0.6);
        color: #fff;
    }

    /* 🟢 ONLINE PULSE EFFECT */
    .avatar-wrapper { position: relative; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; border: 2px solid #ff3c00; }

    .status-dot { 
        position: absolute; bottom: 2px; right: 2px; 
        width: 12px; height: 12px; 
        border-radius: 50%; border: 2px solid #000; 
        z-index: 2;
    }

    .online { background: #00ff00; }
    
    /* The Pulse Ring */
    .online::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        border-radius: 50%;
        background: #00ff00;
        z-index: -1;
        animation: statusPulse 2s infinite;
    }

    @keyframes statusPulse {
        0% { transform: scale(1); opacity: 0.8; }
        100% { transform: scale(2.5); opacity: 0; }
    }

    .offline { background: #555; }
    
    .username { font-weight: bold; font-size: 14px; color: #fff; }
    .rating-text { font-size: 11px; color: #ffae00; }
</style>
</head>
<body>

<div class="inferno-container">
    <div class="header"><div class="live-dot"></div>Latest Recruits</div>
    <div id="memberList">
        <div style="color:#ffae00; text-align:center; padding:20px;">Summoning...</div>
    </div>
</div>

<script>
    const CLUB_ID = "group-a162138be57d83c3500191b84a4b325d";
    const listElement = document.getElementById('memberList');

    async function fetchMembers() {
        try {
            const response = await fetch(`https://api.chess.com/pub/club/${CLUB_ID}/members`);
            const data = await response.json();
            let members = (data.weekly || []).sort((a, b) => b.joined - a.joined).slice(0, 5);

            const detailPromises = members.map(async (m) => {
                const [profile, stats] = await Promise.all([
                    fetch(`https://api.chess.com/pub/player/${m.username}`).then(r => r.json()),
                    fetch(`https://api.chess.com/pub/player/${m.username}/stats`).then(r => r.json())
                ]);
                return { ...profile, stats, username: m.username };
            });

            const results = await Promise.all(detailPromises);
            listElement.innerHTML = '';

            results.forEach((p, i) => {
                const avatar = p.avatar || "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";
                const isOnline = p.status === "online";
                const rating = p.stats.chess_rapid ? p.stats.chess_rapid.last.rating : "N/A";

                const card = document.createElement('a');
                card.href = `https://www.chess.com/member/${p.username}`;
                card.target = "_blank";
                card.className = "member-card";
                card.innerHTML = `
                    <div class="avatar-wrapper">
                        <img src="${avatar}" class="avatar">
                        <div class="status-dot ${isOnline ? 'online' : 'offline'}"></div>
                    </div>
                    <div style="display:flex; flex-direction:column;">
                        <span class="username">${p.username}</span>
                        <span class="rating-text">⚡ Rapid: ${rating}</span>
                    </div>
                `;
                listElement.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }
    fetchMembers();
</script>
</body>
</html>
